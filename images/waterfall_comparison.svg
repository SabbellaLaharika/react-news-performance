<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="#0b0f19" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Grid Lines (Subtle Divider) -->
  <line x1="400" y1="40" x2="400" y2="420" stroke="#334155" stroke-dasharray="4 4" stroke-width="1.5"/>
  
  <!-- Header -->
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" letter-spacing="0.5">
    NETWORK DATA HYDRATION COMPARISON
  </text>
  
  <!-- LEFT COLUMN: SEQUENTIAL -->
  <g transform="translate(0, 0)">
    <!-- Column Title -->
    <rect x="40" y="60" width="320" height="36" rx="6" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1"/>
    <text x="200" y="83" text-anchor="middle" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">
      ❌ UNOPTIMIZED: SEQUENTIAL WATERFALL (N+1)
    </text>
    
    <!-- Time Axis -->
    <line x1="70" y1="120" x2="70" y2="370" stroke="#475569" stroke-width="2"/>
    <polygon points="67,370 70,376 73,370" fill="#475569"/>
    <text x="70" y="395" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold">TIME (LATENCY)</text>
    
    <!-- Step 1 -->
    <rect x="95" y="120" width="120" height="24" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="155" y="136" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Fetch Story 1 (ID: 1)</text>
    <path d="M 155 144 L 155 160 L 175 160" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2 2"/>
    
    <!-- Step 2 -->
    <rect x="175" y="160" width="120" height="24" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="235" y="176" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Fetch Story 2 (ID: 2)</text>
    <path d="M 235 184 L 235 200 L 125 200 L 125 216 L 135 216" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2 2"/>

    <!-- Step 3 -->
    <rect x="135" y="216" width="120" height="24" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="195" y="232" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Fetch Story 3 (ID: 3)</text>
    <path d="M 195 240 L 195 260 L 215 260" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2 2"/>

    <!-- Step 4 -->
    <rect x="215" y="260" width="120" height="24" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="275" y="276" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Fetch Story 4 (ID: 4)</text>

    <!-- Dots indicating N items -->
    <circle cx="200" cy="310" r="3" fill="#64748b"/>
    <circle cx="200" cy="322" r="3" fill="#64748b"/>
    <circle cx="200" cy="334" r="3" fill="#64748b"/>

    <!-- Final Block -->
    <rect x="155" y="350" width="120" height="24" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1" opacity="0.6"/>
    <text x="215" y="366" text-anchor="middle" fill="#e2e8f0" fill-opacity="0.6" font-family="system-ui, -apple-system, sans-serif" font-size="10">Fetch Story 500 (N)</text>

    <!-- Total Time Brackets -->
    <path d="M 345 120 L 355 120 L 355 374 L 345 374" fill="none" stroke="#ef4444" stroke-width="2"/>
    <text x="365" y="250" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">T = sum(t_n)</text>
    <text x="365" y="270" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">~ 8.5s</text>
  </g>
  
  <!-- RIGHT COLUMN: OPTIMIZED PARALLEL -->
  <g transform="translate(400, 0)">
    <!-- Column Title -->
    <rect x="40" y="60" width="320" height="36" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1"/>
    <text x="200" y="83" text-anchor="middle" fill="#a7f3d0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">
      ✅ OPTIMIZED: PARALLEL DISPATCH (Promise.all)
    </text>
    
    <!-- Time Axis -->
    <line x1="70" y1="120" x2="70" y2="370" stroke="#475569" stroke-width="2"/>
    <polygon points="67,370 70,376 73,370" fill="#475569"/>
    <text x="70" y="395" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold">TIME (LATENCY)</text>

    <!-- Promise.all Dispatcher -->
    <rect x="95" y="120" width="180" height="28" rx="6" fill="#0d9488" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="185" y="138" text-anchor="middle" fill="#f0fdfa" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold">Promise.all() Dispatch</text>
    
    <!-- Branching Arrows -->
    <path d="M 115 148 L 115 180" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
    <path d="M 160 148 L 160 180" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
    <path d="M 210 148 L 210 180" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
    <path d="M 255 148 L 255 180" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
    
    <!-- Parallel Blocks (Narrower spacing to prevent right-edge clipping) -->
    <rect x="100" y="180" width="30" height="80" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
    <text x="115" y="220" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="9" transform="rotate(-90 115 220)">Req 1</text>

    <rect x="145" y="180" width="30" height="110" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
    <text x="160" y="235" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="9" transform="rotate(-90 160 235)">Req 2</text>

    <rect x="195" y="180" width="30" height="70" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
    <text x="210" y="215" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="9" transform="rotate(-90 210 215)">Req 3</text>

    <rect x="240" y="180" width="30" height="95" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
    <text x="255" y="227" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="9" transform="rotate(-90 255 227)">Req 500</text>

    <!-- Concurrency Label -->
    <text x="185" y="312" text-anchor="middle" fill="#38bdf8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">Concurrently processed</text>

    <!-- Resolution Bar -->
    <path d="M 100 325 L 270 325" stroke="#10b981" stroke-dasharray="4 4" stroke-width="1.5"/>
    <rect x="115" y="335" width="140" height="24" rx="4" fill="#065f46" stroke="#059669" stroke-width="1"/>
    <text x="185" y="350" text-anchor="middle" fill="#ecfdf5" font-family="system-ui, -apple-system, sans-serif" font-size="10">Resolve &amp; Render All</text>

    <!-- Total Time Brackets (Shifted left to guarantee no clipping) -->
    <path d="M 285 120 L 295 120 L 295 290 L 285 290" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="305" y="195" fill="#a7f3d0" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">T = max(t_n)</text>
    <text x="305" y="215" fill="#a7f3d0" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">~ 0.3s</text>
  </g>
</svg>
